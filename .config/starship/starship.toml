"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 500

format = """
$directory\
$git_branch\
$git_status\
$c\
$golang\
$java\
$kotlin\
$nodejs\
$php\
$python\
$ruby\
$rust\
$zig\
$docker_context\
$nix_shell\
$cmd_duration\
$fill\
$battery\
$time\
$line_break\
$character"""

# ── OS Icon ──────────────────────────────────────
[os]
disabled = false
format = '[$symbol]($style) '
style = "bold"

[os.symbols]
Arch = "󰣇"
Linux = ""
Macos = ""
Windows = "󰍲"
Ubuntu = ""
Fedora = ""

# ── Directory ────────────────────────────────────
[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"

[directory.substitutions]
"~/Desktop/Nuclear Codes" = "Nuclear Codes"
"mercury_sols" = " "
"Projects" = "󰲋 "
"repos" = " "
".local" = "󰆼 "

# ── Git ──────────────────────────────────────────
[git_branch]
symbol = " "
format = '[$symbol$branch]($style) '
style = "italic"

[git_status]
format = '[$all_status$ahead_behind]($style)'
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
conflicted = " "
untracked = "? "
modified = " "
staged = " "
stashed = "📦 "
deleted = "✘ "
renamed = "» "

# ── Languages ────────────────────────────────────
[c]
symbol = " "
format = '[$symbol($version)]($style) '

[golang]
symbol = " "
format = '[$symbol($version)]($style) '

[java]
symbol = " "
format = '[$symbol($version)]($style) '

[kotlin]
symbol = " "
format = '[$symbol($version)]($style) '

[nodejs]
symbol = " "
format = '[$symbol($version)]($style) '

[php]
symbol = " "
format = '[$symbol($version)]($style) '

[python]
symbol = " "
format = '[$symbol($version)(\($virtualenv\))]($style) '

[ruby]
symbol = " "
format = '[$symbol($version)]($style) '

[rust]
symbol = "🦀 "
format = '[$symbol($version)]($style) '

[zig]
symbol = " "
format = '[$symbol($version)]($style) '

# ── Containers ───────────────────────────────────
[docker_context]
symbol = " "
format = '[$symbol$context]($style) '

[nix_shell]
symbol = " "
format = '[$symbol$state]($style) '

# ── Command Duration ─────────────────────────────
[cmd_duration]
min_time = 500
format = '[󱎫 $duration]($style) '

# ── Fill ─────────────────────────────────────────
[fill]
symbol = " "

# ── Right Side ───────────────────────────────────
[battery]
format = '[$symbol$percentage]($style) '

[[battery.display]]
threshold = 20
discharging_symbol = "󱊡 "

[[battery.display]]
threshold = 50
discharging_symbol = "󱊢 "

[[battery.display]]
threshold = 100
discharging_symbol = "󱊣 "

[time]
disabled = false
time_format = "%R"
format = '[ $time]($style)'

# ── Prompt Character ─────────────────────────────
[character]
success_symbol = "[❯](bold)"
error_symbol = "[✗](bold red)"
